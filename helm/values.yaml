# Per-user state lives in a SQLite DB on a RWO PVC (see persistence below),
# so replicaCount must remain 1 — multiple pods cannot share the volume and
# would each see a divergent view of state.
replicaCount: 1

image:
  repository: mcp-oauth2-demo
  pullPolicy: IfNotPresent
  tag: "latest"

# References to existing Kubernetes Secrets of type kubernetes.io/dockerconfigjson
# used to pull `image.repository` from a private registry. Leave empty when the
# image is public. Create the secret separately, e.g.:
#   kubectl create secret docker-registry my-registry-creds \
#     --docker-server=registry.example.com --docker-username=... --docker-password=...
# Then set:
#   imagePullSecrets:
#     - name: my-registry-creds
imagePullSecrets: []

service:
  type: ClusterIP
  port: 8000

auth:
  # OIDC provider's OpenID configuration URL (required).
  # e.g. https://YOUR_TENANT.auth0.com/.well-known/openid-configuration
  oidcConfigUrl: ""

  # OAuth application client ID (required).
  oidcClientId: ""

  # OAuth application client secret (required).
  # Stored in a Kubernetes Secret. Use existingSecret to reference a pre-existing one.
  oidcClientSecret: ""

  # Reference an existing Secret instead of creating one from oidcClientSecret above.
  # The named secret must contain the key specified by secretKey.
  existingSecret: ""
  secretKey: "oidc-client-secret"

  # API audience identifier — required by some providers (e.g. Auth0); omit for others.
  oidcAudience: ""

  # Set to true when the provider issues opaque (non-JWT) access tokens (e.g. GitLab).
  # The server will verify the id_token JWT instead.
  verifyIdToken: false

  # Public URL of this server, used to construct OAuth redirect URIs.
  # For an OpenShift Route with TLS, this should be https://<route-hostname>.
  # Must match the callback URL registered with your OIDC provider.
  baseUrl: ""

# OpenShift Route for external access.
route:
  enabled: true
  # Hostname assigned by OpenShift when left empty.
  host: ""
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# Per-user state (SQLite). Required for state to survive pod restarts.
# Disable for an ephemeral demo (state is lost on restart). Because the DB
# lives on a RWO PVC, replicaCount must stay 1 and the Deployment uses the
# Recreate strategy so the old pod releases the volume before the new one
# starts.
persistence:
  enabled: true
  # By default, uninstalling this release will delete the chart-managed PVC
  # and permanently lose all per-user state. Set keepOnDelete: true to add
  # the helm.sh/resource-policy: keep annotation, which causes Helm to leave
  # the PVC (and its data) in place on uninstall. You are then responsible
  # for deleting it manually when no longer needed.
  #
  # Toggle-back caveat: flipping keepOnDelete from true to false and running
  # `helm upgrade` may not remove the annotation from the live PVC on every
  # Helm version (the annotation is consulted by Helm's uninstall path, not
  # reconciled like a regular field). If you need deletion-on-uninstall to
  # resume, verify with `kubectl get pvc <name> -o yaml` after the upgrade
  # and `kubectl annotate pvc <name> helm.sh/resource-policy-` if it lingers.
  keepOnDelete: false
  # Reference an existing PVC instead of letting the chart create one.
  existingClaim: ""
  size: 1Gi
  # StorageClass for the chart-managed PVC. Empty uses the cluster default.
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  # Mount path inside the container. STATE_DB_PATH is set to
  # <mountPath>/server_state.db automatically.
  mountPath: /var/lib/mcp-oauth2-demo

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
