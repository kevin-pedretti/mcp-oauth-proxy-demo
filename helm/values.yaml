# Per-user state lives in a SQLite DB on a RWO PVC (see persistence below),
# so replicaCount must remain 1 — multiple pods cannot share the volume and
# would each see a divergent view of state.
replicaCount: 1

image:
  repository: mcp-oauth2-demo
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

auth:
  # OIDC provider's OpenID configuration URL (required).
  # e.g. https://YOUR_TENANT.auth0.com/.well-known/openid-configuration
  oidcConfigUrl: ""

  # OAuth application client ID (required).
  oidcClientId: ""

  # OAuth application client secret (required).
  # Stored in a Kubernetes Secret. Use existingSecret to reference a pre-existing one.
  oidcClientSecret: ""

  # Reference an existing Secret instead of creating one from oidcClientSecret above.
  # The named secret must contain the key specified by existingSecretKey.
  existingSecret: ""
  existingSecretKey: "oidc-client-secret"

  # API audience identifier — required by some providers (e.g. Auth0); omit for others.
  oidcAudience: ""

  # Set to true when the provider issues opaque (non-JWT) access tokens (e.g. GitLab).
  # The server will verify the id_token JWT instead.
  verifyIdToken: false

  # Public URL of this server, used to construct OAuth redirect URIs.
  # For an OpenShift Route with TLS, this should be https://<route-hostname>.
  # Must match the callback URL registered with your OIDC provider.
  baseUrl: ""

# OpenShift Route for external access.
route:
  enabled: true
  # Hostname assigned by OpenShift when left empty.
  host: ""
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# Per-user state (SQLite). Required for state to survive pod restarts.
# Disable for an ephemeral demo (state is lost on restart). Because the DB
# lives on a RWO PVC, replicaCount must stay 1 and the Deployment uses the
# Recreate strategy so the old pod releases the volume before the new one
# starts.
persistence:
  enabled: true
  # Reference an existing PVC instead of letting the chart create one.
  existingClaim: ""
  size: 1Gi
  # StorageClass for the chart-managed PVC. Empty uses the cluster default.
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  # Mount path inside the container. STATE_DB_PATH is set to
  # <mountPath>/server_state.db automatically.
  mountPath: /var/lib/mcp-oauth2-demo

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
