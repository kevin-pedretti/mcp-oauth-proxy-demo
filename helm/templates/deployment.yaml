apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-oauth2-demo.fullname" . }}
  labels:
    {{- include "mcp-oauth2-demo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.persistence.enabled }}
  # RWO PVC can only attach to one pod at a time; Recreate guarantees the
  # old pod is gone before the new one tries to mount.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "mcp-oauth2-demo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-oauth2-demo.selectorLabels" . | nindent 8 }}
    spec:
      # OpenShift assigns a random UID at runtime; runAsNonRoot ensures it is
      # never root regardless of which UID is chosen.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            # STATE_DB_PATH must always be set, even when persistence is off:
            # main.py defaults the DB path to <module-dir>/server_state.db,
            # but /app is owned by root in the UBI9 image and the pod runs
            # as a non-root UID, so the default would EACCES on first write.
            # /tmp is writable by any UID; the DB is ephemeral in this branch.
            - name: STATE_DB_PATH
              {{- if .Values.persistence.enabled }}
              value: {{ printf "%s/server_state.db" .Values.persistence.mountPath | quote }}
              {{- else }}
              value: "/tmp/server_state.db"
              {{- end }}
            - name: OIDC_CONFIG_URL
              value: {{ .Values.auth.oidcConfigUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.auth.oidcClientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp-oauth2-demo.secretName" . }}
                  key: {{ .Values.auth.existingSecretKey }}
            {{- if .Values.auth.oidcAudience }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.auth.oidcAudience | quote }}
            {{- end }}
            {{- if .Values.auth.verifyIdToken }}
            - name: OIDC_VERIFY_ID_TOKEN
              value: "true"
            {{- end }}
            {{- if .Values.auth.baseUrl }}
            - name: BASE_URL
              value: {{ .Values.auth.baseUrl | quote }}
            {{- end }}
          # Liveness stays tcpSocket — cheap hang-detection that doesn't
          # depend on auth being wired up. We only want to restart the pod
          # if the process is genuinely stuck.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          # Readiness hits the OAuth authorization-server discovery endpoint.
          # This route is registered by FastMCP's auth provider (OIDCProxy or
          # InMemoryOAuthProvider in --dev) and is publicly readable, so a
          # 200 confirms the server is bound *and* the OAuth proxy has
          # initialized. Plain tcpSocket would mark the pod ready as soon as
          # the listener bound, even if token validation wasn't yet wired up.
          readinessProbe:
            httpGet:
              path: /.well-known/oauth-authorization-server
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: state
              mountPath: {{ .Values.persistence.mountPath | quote }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: {{ include "mcp-oauth2-demo.pvcName" . }}
      {{- end }}
