apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-oauth2-demo.fullname" . }}
  labels:
    {{- include "mcp-oauth2-demo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mcp-oauth2-demo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-oauth2-demo.selectorLabels" . | nindent 8 }}
    spec:
      # OpenShift assigns a random UID at runtime; runAsNonRoot ensures it is
      # never root regardless of which UID is chosen.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: OIDC_CONFIG_URL
              value: {{ .Values.auth.oidcConfigUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.auth.oidcClientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp-oauth2-demo.secretName" . }}
                  key: {{ .Values.auth.existingSecretKey }}
            {{- if .Values.auth.oidcAudience }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.auth.oidcAudience | quote }}
            {{- end }}
            {{- if .Values.auth.verifyIdToken }}
            - name: OIDC_VERIFY_ID_TOKEN
              value: "true"
            {{- end }}
            {{- if .Values.auth.baseUrl }}
            - name: BASE_URL
              value: {{ .Values.auth.baseUrl | quote }}
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
