name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit lands. Saves
# CI minutes and avoids merging based on a green check from a stale commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    # All third-party actions are SHA-pinned for supply-chain integrity.
    # The trailing comment on each `uses:` records the tag the SHA resolves
    # to; when bumping, look up the new SHA with:
    #   git ls-remote https://github.com/<owner>/<repo> refs/tags/<tag>
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          # Match the local interpreter pinned in .python-version so CI
          # cannot silently drift to a newer minor.
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      # Pass `.` rather than an explicit file list so newly added .py files
      # at the repo root are type-checked automatically. mypy excludes the
      # .venv on its own.
      - name: Mypy
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest -v
